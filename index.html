<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Ondřej Bílek</title>
	<meta name="description" content="Ondřej Bílek — Member of Technical Staff at Tailscale." />
	<link rel="shortcut icon" type="image/x-icon" href="assets/favicon.ico" />
	<style>
		:root {
			--bg: #fbfbf9;
			--fg: #1b1f23;
			--muted: #6a737d;
			--accent: #0a7d4f;
			--selection: #cfe9da;
		}
		@media (prefers-color-scheme: dark) {
			:root {
				--bg: #0d1117;
				--fg: #e6edf3;
				--muted: #8b949e;
				--accent: #3fb950;
				--selection: #173a26;
			}
		}

		* { box-sizing: border-box; }
		html, body { height: 100%; }

		body {
			margin: 0;
			padding: 1.5rem;
			background: var(--bg);
			color: var(--fg);
			font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
			font-size: 16px;
			line-height: 1.75;
			display: flex;
			align-items: center;
			justify-content: center;
			-webkit-font-smoothing: antialiased;
		}

		::selection { background: var(--selection); }

		main { width: 100%; max-width: 38rem; }

		.prompt { color: var(--accent); }
		.prompt .host { color: var(--muted); }

		.line { white-space: pre-wrap; }
		.out { margin: 0.1rem 0 1.5rem; }
		.out:last-of-type { margin-bottom: 0; }

		h1 {
			display: inline;
			margin: 0;
			font-size: inherit;
			font-weight: 700;
		}
		.role { color: var(--muted); }

		.links a {
			margin-right: 1.1rem;
			color: var(--fg);
			text-decoration: none;
		}
		.links a:last-child { margin-right: 0; }
		.links a:hover,
		.links a:focus-visible { color: var(--accent); }

		.cursor {
			display: inline-block;
			width: 0.6em;
			height: 1.05em;
			margin-left: 0.15em;
			background: var(--accent);
			vertical-align: text-bottom;
			animation: blink 1.1s steps(2, start) infinite;
		}
		@keyframes blink { to { visibility: hidden; } }
		@media (prefers-reduced-motion: reduce) {
			.cursor { animation: none; }
		}
	</style>
</head>
<body>
	<main>
		<div class="line"><span class="prompt"><span class="host">ondrej@dev</span>:~$</span> whoami</div>
		<div class="out"><h1>Ondřej Bílek</h1> — <span class="role">Member of Technical Staff @ Tailscale</span></div>

		<div class="line"><span class="prompt"><span class="host">ondrej@dev</span>:~$</span> links</div>
		<div class="out links">
			<a href="https://github.com/bilcus">[github]</a><a href="https://www.linkedin.com/in/ondrejbilek">[linkedin]</a><a href="https://twitter.com/Bilcus">[twitter]</a><a href="mailto:bilcuss@gmail.com">[email]</a>
		</div>

		<div class="line"><span class="prompt"><span class="host">ondrej@dev</span>:~$</span><span class="cursor"></span></div>
	</main>
</body>
</html>
