<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Ondřej Bílek</title>
	<meta name="description" content="Ondřej Bílek — Member of Technical Staff at Tailscale." />
	<link rel="shortcut icon" type="image/x-icon" href="assets/favicon.ico" />
	<style>
		:root {
			--bg: #fbfbf9;
			--fg: #1b1f23;
			--muted: #6a737d;
			--accent: #0a7d4f;
			--selection: #cfe9da;
		}
		@media (prefers-color-scheme: dark) {
			:root {
				--bg: #0d1117;
				--fg: #e6edf3;
				--muted: #8b949e;
				--accent: #3fb950;
				--selection: #173a26;
			}
		}

		* { box-sizing: border-box; }
		html, body { height: 100%; }

		body {
			margin: 0;
			padding: 1.5rem;
			background: var(--bg);
			color: var(--fg);
			font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
			font-size: 15px;
			line-height: 1.7;
			display: flex;
			align-items: center;
			justify-content: center;
			-webkit-font-smoothing: antialiased;
		}

		::selection { background: var(--selection); }

		main { width: 100%; max-width: 34rem; }

		h1 {
			margin: 0;
			font-size: 1.25rem;
			font-weight: 600;
			letter-spacing: -0.01em;
		}

		.role {
			margin: 0.35rem 0 0;
			color: var(--muted);
		}

		.links {
			margin-top: 1.75rem;
			color: var(--muted);
		}
		.links a {
			color: var(--fg);
			text-decoration: none;
			border-bottom: 1px solid transparent;
			transition: color .15s ease, border-color .15s ease;
		}
		.links a:hover,
		.links a:focus-visible {
			color: var(--accent);
			border-color: var(--accent);
		}
		.sep { margin: 0 0.6rem; }
	</style>
</head>
<body>
	<main>
		<h1>Ondřej Bílek</h1>
		<p class="role">Member of Technical Staff, Tailscale</p>
		<nav class="links">
			<a href="https://github.com/bilcus">github</a><span class="sep">·</span><a href="https://www.linkedin.com/in/ondrejbilek">linkedin</a><span class="sep">·</span><a href="https://twitter.com/Bilcus">twitter</a><span class="sep">·</span><a href="mailto:bilcuss@gmail.com">email</a>
		</nav>
	</main>
</body>
</html>
